<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Knowledge Coach AI</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for modern iconography -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Animated Blobs for aesthetic vibe -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div id="app">
        <div id="screenContainer">
            <!-- SCREEN 1: LEARNING -->
            <main id="learningScreen" class="screen active">
        <header class="app-header">
            <div class="header-left">
                <i class="ph-fill ph-book-open icon-gradient" style="background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary)); -webkit-background-clip: text; background-clip: text;"></i>
                <h2>正在學習中</h2>
            </div>
            <div class="header-right">
                <button class="theme-toggle-btn" title="切換深淺色模式">
                    <i class="ph-bold ph-sun"></i>
                </button>
                <button class="settings-btn" title="API 設定">
                    <i class="ph-bold ph-gear"></i>
                </button>
            </div>
        </header>
                
                <section class="current-learning">
                    <p class="subtitle">學習中的主題</p>
                    <div id="activeTopicsContainer" class="active-topics-grid">
                        <!-- Cards will be populated here by JS -->
                    </div>
                </section>
            </main>

            <!-- SCREEN 2: EXPLORE -->
            <section id="exploreScreen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <i class="ph-fill ph-sparkle icon-gradient"></i>
                <h2>探索新主題</h2>
            </div>
            <div class="header-right">
                <button class="theme-toggle-btn" title="切換深淺色模式">
                    <i class="ph-bold ph-sun"></i>
                </button>
                <button class="settings-btn" title="API 設定">
                    <i class="ph-bold ph-gear"></i>
                </button>
            </div>
        </header>

                <div class="scroll-container">
                    <section class="topic-section">
                        <div class="section-header">
                            <h3 class="section-title"><i class="ph-fill ph-lightbulb"></i> AI 推薦主題</h3>
                            <button class="icon-btn refresh-btn" id="refreshRecBtn" title="刷新推薦主題">
                                <i class="ph-bold ph-arrows-clockwise"></i>
                            </button>
                        </div>
                        <div class="topic-grid" id="recommendedGrid">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section class="topic-section">
                        <div class="section-header">
                            <h3 class="section-title"><i class="ph-fill ph-music-notes"></i> 專屬主題</h3>
                            <button class="icon-btn refresh-btn" id="refreshExcBtn" title="刷新專屬主題">
                                <i class="ph-bold ph-arrows-clockwise"></i>
                            </button>
                        </div>
                        <div class="topic-grid highlight-grid" id="exclusiveGrid">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section class="topic-section">
                        <h3 class="section-title"><i class="ph-fill ph-magic-wand"></i> 或自訂你想學的</h3>
                        <div class="custom-topic-input">
                            <input type="text" id="customTopicInput" placeholder="例如：面試英文..." class="glass-input">
                            <button id="startCustomTopicBtn" class="btn btn-primary">開始</button>
                        </div>
                    </section>
                </div>
            </section>

            <!-- SCREEN 3: CHAT -->
            <main id="chatScreen" class="screen chat-layout">
                <header class="app-header chat-header">
                    <button class="icon-btn back-btn" data-target="learningScreen">
                        <i class="ph-bold ph-arrow-left"></i>
                    </button>
                    <div class="chat-title-group">
                        <h2 id="chatTopicName">設計模式</h2>
                        <select id="chatDaySelector" class="day-badge">
                            <option value="1">Day 1</option>
                        </select>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" id="favoriteBtn" title="加入最愛清單">
                            <i class="ph-bold ph-star" id="favoriteIcon"></i>
                        </button>
                        <button class="icon-btn" id="finishDayBtn" title="完成今日學習">
                            <i class="ph-bold ph-check-circle"></i>
                        </button>
                    </div>
                </header>

                <div class="chat-container" id="chatContainer">
                    <!-- Messages -->
                </div>

                <div class="chat-input-area">
                    <button id="micBtn" class="icon-btn mic-btn">
                        <i class="ph-bold ph-microphone"></i>
                    </button>
                    <input type="text" id="chatInput" placeholder="有什麼不懂的嗎？..." class="glass-input">
                    <button id="sendBtn" class="btn btn-primary icon-only-btn">
                        <i class="ph-bold ph-paper-plane-right"></i>
                    </button>
                </div>
            </main>

            <!-- SCREEN 4: FAVORITES -->
            <section id="favoritesScreen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <i class="ph-fill ph-star icon-gradient" style="background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; background-clip: text;"></i>
                <h2>最愛主題</h2>
            </div>
            <div class="header-right">
                <button class="theme-toggle-btn" title="切換深淺色模式">
                    <i class="ph-bold ph-sun"></i>
                </button>
                <button class="settings-btn" title="API 設定">
                    <i class="ph-bold ph-gear"></i>
                </button>
            </div>
        </header>
                <section class="scroll-container">
                    <p class="subtitle">收藏的議題</p>
                    <div id="favoriteTopicsContainer" class="active-topics-grid">
                        <!-- Populated by JS -->
                    </div>
                </section>
            </section>
        </div>
    
        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <div class="nav-item" data-target="exploreScreen">
                <i class="ph-bold ph-compass"></i>
                <span>探索</span>
            </div>
            <div class="nav-item active" data-target="learningScreen">
                <i class="ph-fill ph-book-open"></i>
                <span>學習中</span>
            </div>
            <div class="nav-item" data-target="favoritesScreen">
                <i class="ph-bold ph-star"></i>
                <span>最愛</span>
            </div>
        </nav>
    </div>

    <!-- API Settings Modal -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="glass-panel modal-content settings-modal-content">
            <header class="modal-header">
                <h2><i class="ph-bold ph-gear"></i> API 設定</h2>
                <button class="icon-btn close-modal" id="closeSettingsBtn">&times;</button>
            </header>
            <div class="modal-body">
                <div class="settings-hint">
                    <i class="ph-fill ph-info"></i>
                    <div>
                        <p>請填寫您的 API Key。</p>
                        <small>自動識別 OpenAI 格式 (sk-...) 或 Google Gemini (AIza...)</small>
                    </div>
                </div>

                <div class="form-group main-key-group" style="margin-bottom: 16px;">
                    <label><i class="ph-bold ph-key"></i> API Key</label>
                    <input type="password" id="apiKeyInput" class="glass-input highlight-input" placeholder="貼上您的 API Key...">
                    <div style="text-align: right; margin-top: 6px;">
                        <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: var(--accent-tertiary); font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;">
                            <i class="ph-bold ph-arrow-square-out"></i> 點此取得免費 Google Gemini API
                        </a>
                    </div>
                </div>


                
                <button id="saveSettingsBtn" class="btn btn-primary save-btn">
                    <i class="ph-bold ph-floppy-disk"></i> 儲存設定
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast glass-panel hidden">
        <i class="ph-fill ph-info"></i>
        <span id="toastMessage">通知訊息</span>
    </div>

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js?v=1.9"></script>
</body>
</html>
